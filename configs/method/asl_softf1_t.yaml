# @package _global_
run:
  name: asl_softf1_t
eval:
  threshold: 0.5
  tune_threshold_on_val: false
  threshold_strategy: global
  threshold_grid: [0.1, 0.15, 0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7]
loss:
  cls:
    name: asl_soft_f1
    gamma_pos: 0.0
    gamma_neg: 4.0
    clip: 0.05
    eps: 1.0e-8
    frequency_csv: ${data.frequency}
    lambda_soft_f1: 0.2
    lambda_tail_recall: 0.05
    soft_temperature: 0.5
    tail_recall_target: 0.65
    threshold_by_group:
      head: 0.5
      medium: 0.35
      tail: 0.25
      default: 0.5
    group_weights:
      head: 1.0
      medium: 1.25
      tail: 1.5
      default: 1.0
