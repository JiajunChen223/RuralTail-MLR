name: ruraltail-mlr
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - "numpy<2"
  - pandas
  - pillow
  - pyyaml
  - scikit-learn
  - matplotlib
  - tqdm
  - pytorch
  - torchvision
  - pytorch-cuda=12.1
  - pip:
      - hydra-core>=1.3
      - omegaconf>=2.3
      - timm>=0.9
      - opencv-python>=4.8,<4.12
      - pytest>=8.0
      - ruff>=0.6
# Optional MLM-R18 carrier dependencies are kept in requirements-mamba.txt
# because mamba-ssm and causal-conv1d are CUDA/PyTorch-build sensitive.
