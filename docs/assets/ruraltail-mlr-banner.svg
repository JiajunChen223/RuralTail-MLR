    </linearGradient>
    <linearGradient id="fieldC" x1="284" y1="92" x2="684" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D7B56D"/>
      <stop offset="1" stop-color="#8CBF7B"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.16"/>
    </filter>
