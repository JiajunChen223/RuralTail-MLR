    <rect x="788" y="111" width="258" height="15" rx="7.5" fill="#1D4ED8"/>
    <rect x="788" y="145" width="188" height="15" rx="7.5" fill="#0F766E"/>
    <rect x="788" y="179" width="118" height="15" rx="7.5" fill="#F97316"/>
    <rect x="788" y="213" width="66" height="15" rx="7.5" fill="#BE123C"/>
