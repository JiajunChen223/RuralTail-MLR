  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="760" y="63" fill="#0F172A" font-size="24" font-weight="700">tail-aware multi-label recognition</text>
    <text x="760" y="329" fill="#334155" font-size="18" font-weight="600">BCE / Focal / ASL / TALC  -  H/M/T group evaluation  -  paper protocol</text>
    <text x="96" y="70" fill="#0F172A" font-size="42" font-weight="800">RuralTail-MLR</text>
    <text x="98" y="102" fill="#475569" font-size="18" font-weight="600">remote-sensing fields, long-tailed labels, reproducible protocol</text>
