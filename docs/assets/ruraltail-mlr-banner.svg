<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RuralTail-MLR project banner</title>
  <desc id="desc">A stylized remote-sensing field grid with long-tailed label bars and TALC protocol text.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EAF6F3"/>
      <stop offset="0.45" stop-color="#F7FBF8"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="fieldA" x1="104" y1="226" x2="500" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5C9E58"/>
